version: "3.8"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ./data/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    networks:
      - seedbox_net

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/jellyfin:/config
      - ./data/downloads:/data/downloads:ro
    ports:
      - 8096:8096
    restart: unless-stopped
    networks:
      - seedbox_net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - seedbox_net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/radarr:/config
      - ./data/downloads:/downloads
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      - seedbox_net

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/sonarr:/config
      - ./data/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - seedbox_net

  overseerr:
    image: sgeto/overseerr:latest
    container_name: overseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/overseerr:/config
    ports:
      - 5055:5055
    restart: unless-stopped
    networks:
      - seedbox_net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Africa/Cairo
    ports:
      - 8191:8191
    restart: unless-stopped
    networks:
      - seedbox_net

  tor-proxy:
    image: peterdavehello/tor-socks-proxy:latest
    container_name: tor-proxy
    restart: unless-stopped
    networks:
      - seedbox_net

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
    volumes:
      - ./config/jackett:/config
    ports:
      - 9117:9117
    restart: unless-stopped
    networks:
      - seedbox_net

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Africa/Cairo
      - SUBDOMAINS=${SUBDOMAINS}
      - TOKEN=${DUCKDNS_TOKEN}
    restart: unless-stopped

  stremio-addon:
    build: ./stremio-addon
    container_name: stremio-addon
    environment:
      - PORT=7000
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - DOMAIN=${DOMAIN}
      - DASHBOARD_USER=${DASHBOARD_USER}
      - DASHBOARD_PASS=${DASHBOARD_PASS}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - ./data/downloads:/downloads
    ports:
      - 7000:7000
    depends_on:
      - qbittorrent
      - jackett
      - prowlarr
    restart: unless-stopped
    networks:
      - seedbox_net

networks:
  seedbox_net:
    driver: bridge
