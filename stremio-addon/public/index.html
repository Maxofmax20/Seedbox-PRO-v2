<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SandBox PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060f; --glass: rgba(15, 18, 35, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-nav { color: #818cf8; position: relative; }
        .active-nav::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #818cf8; border-radius: 50%; }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-slow { animation: pulse-subtle 3s infinite; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Auth Overlay (Hidden by Default) -->
    <div id="login-screen" class="fixed inset-0 z-[300] bg-[#05060f] flex flex-col items-center justify-center p-8 hidden">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl mb-8 flex items-center justify-center shadow-2xl shadow-indigo-500/40">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold mb-2">SandBox <span class="text-indigo-500">PRO</span></h1>
        <p class="text-slate-500 text-sm mb-10 font-medium">Authentication Required</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="username" placeholder="Username" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500 transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-slate-900/50 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500 transition-all">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-500/30 active:scale-95 transition-all">Unlock System</button>
            <p id="login-error" class="text-red-400 text-xs text-center hidden">Access Denied.</p>
        </div>
    </div>

    <!-- Main Mobile Interface -->
    <div id="dashboard-content" class="min-h-screen hidden">
        
        <!-- Header -->
        <header class="p-6 pt-10 flex justify-between items-center sticky top-0 bg-[#05060f]/80 backdrop-blur-md z-40">
            <div>
                <span class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-indigo-500 mb-1 block">Live Node</span>
                <h1 class="text-2xl font-extrabold">Control Center</h1>
            </div>
            <button onclick="document.getElementById('add-modal').classList.remove('hidden')" class="w-12 h-12 glass rounded-2xl flex items-center justify-center active:scale-90 transition-all">
                <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
            </button>
        </header>

        <main class="p-6 safe-bottom">
            <!-- Summary Card -->
            <div class="glass rounded-[2rem] p-8 mb-8 relative overflow-hidden accent-glow">
                <div class="absolute top-0 right-0 p-6 opacity-10">
                    <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="relative z-10">
                    <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Storage Usage</h3>
                    <div class="flex items-baseline gap-2">
                        <span class="text-5xl font-black gradient-text" id="stream-count">0</span>
                        <span class="text-slate-500 font-bold">Active Tasks</span>
                    </div>
                    <div class="mt-6 flex gap-4">
                        <div class="flex-1 bg-slate-900/50 rounded-2xl p-4 border border-slate-800">
                            <span class="text-[9px] uppercase font-bold text-slate-500 block mb-1">Downstream</span>
                            <span class="font-bold text-green-400" id="total-speed">0.0 KB/s</span>
                        </div>
                        <div class="flex-1 bg-slate-900/50 rounded-2xl p-4 border border-slate-800">
                            <span class="text-[9px] uppercase font-bold text-slate-500 block mb-1">Status</span>
                            <span class="font-bold text-indigo-400">Stable</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Streams Section -->
            <section class="mb-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-500 italic">Live Buffers</h2>
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-ping"></span>
                </div>
                <div id="active-streams" class="space-y-4">
                    <!-- Stream Cards -->
                </div>
            </section>

            <!-- Seedbox Manager Section -->
            <section>
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-500 italic">Vault Storage</h2>
                    <button onclick="updateUI()" class="text-indigo-400 text-xs font-bold">REFRESH</button>
                </div>
                <div id="torrent-list" class="space-y-4">
                    <!-- Torrent Cards -->
                </div>
            </section>
        </main>

        <!-- Fixed Bottom Nav -->
        <nav class="fixed bottom-0 left-0 right-0 p-6 z-50">
            <div class="glass rounded-[2rem] p-4 flex justify-around items-center shadow-2xl shadow-black/50">
                <a href="#" class="active-nav"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></a>
                <a href="/jellyfin" target="_blank" class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></a>
                <a href="/radarr" target="_blank" class="text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V4a1 1 0 00-1-1H4a1 1 0 00-1 1v15a1 1 0 001 1z"/></svg></a>
                <button onclick="handleLogout()" class="text-red-500/70"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg></button>
            </div>
        </nav>
    </div>

    <!-- Modals (Add, etc) -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-lg p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-extrabold italic">ADD MEDIA</h3>
                <button onclick="document.getElementById('add-modal').classList.add('hidden')" class="text-slate-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3 block">Magnet Link</label>
                    <input type="text" id="magnet-input" placeholder="Paste magnet..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-xs outline-none focus:border-indigo-500">
                    <button onclick="addByMagnet()" class="w-full mt-3 bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-500/20">Add Magnet</button>
                </div>
                <div class="text-center text-[10px] font-black text-slate-600 uppercase tracking-widest">— OR —</div>
                <div>
                    <input type="file" id="file-input" class="hidden">
                    <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-800 py-4 rounded-2xl font-black text-xs uppercase tracking-widest border border-slate-700">Upload .torrent</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function checkAuth() {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                startPolling();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard-content').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) checkAuth();
            else {
                document.getElementById('login-error').classList.remove('hidden');
                setTimeout(() => document.getElementById('login-error').classList.add('hidden'), 3000);
            }
        }

        async function handleLogout() { await fetch('/api/logout', { method: 'POST' }); checkAuth(); }

        async function updateUI() {
            try {
                const [sRes, tRes] = await Promise.all([fetch('/status'), fetch('/api/torrents')]);
                if (sRes.status === 401) return;
                const streams = await sRes.json();
                const torrents = await tRes.json();

                // Stats
                document.getElementById('stream-count').innerText = streams.length + torrents.length;
                let totalSpeed = torrents.reduce((acc, t) => acc + parseFloat(t.speed), 0);
                document.getElementById('total-speed').innerText = totalSpeed.toFixed(1) + ' KB/s';

                // Streams
                const sDiv = document.getElementById('active-streams');
                sDiv.innerHTML = streams.length === 0 ? '<p class="text-slate-600 text-center py-6 text-xs font-bold uppercase tracking-widest">No active streams</p>' : streams.map(s => `
                    <div class="glass p-6 rounded-[1.5rem] border border-indigo-500/10">
                        <h4 class="font-bold text-sm truncate mb-3">${s.name}</h4>
                        <div class="flex items-center gap-4">
                            <div class="relative w-12 h-12 flex-shrink-0">
                                <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36">
                                    <path class="text-slate-800" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    <path class="text-indigo-500" stroke-dasharray="${s.progress}, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                </svg>
                                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-black">${Math.round(s.progress)}%</div>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 tracking-widest">
                                    <span>🚀 ${s.speed} KB/s</span>
                                    <span>👤 ${s.peers} PEERS</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Torrents
                const tDiv = document.getElementById('torrent-list');
                tDiv.innerHTML = torrents.length === 0 ? '<p class="text-slate-600 text-center py-6 text-xs font-bold uppercase tracking-widest">Library Empty</p>' : torrents.map(t => `
                    <div class="glass p-5 rounded-[1.5rem] flex items-center gap-4 transition-all active:scale-[0.98]">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-xs truncate mb-1">${t.name}</h4>
                            <div class="flex items-center gap-2">
                                <span class="text-[8px] font-black uppercase px-2 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 tracking-widest">${t.status}</span>
                                <span class="text-[8px] font-black uppercase text-slate-500 tracking-widest">${t.progress}% • ${t.size}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="deleteTorrent('${t.hash}')" class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function addByMagnet() {
            const magnet = document.getElementById('magnet-input').value;
            if (!magnet) return;
            await fetch('/api/torrents/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ magnet }) });
            document.getElementById('add-modal').classList.add('hidden');
            updateUI();
        }

        async function deleteTorrent(hash) { if (confirm("Remove permanently?")) { await fetch(`/api/torrents/${hash}`, { method: 'DELETE' }); updateUI(); } }

        function startPolling() { setInterval(updateUI, 3000); updateUI(); }

        checkAuth();
    </script>
</body>
</html>
