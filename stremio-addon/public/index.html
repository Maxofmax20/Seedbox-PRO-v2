<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SandBox PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060f; --glass: rgba(15, 18, 35, 0.9); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 100px); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .drawer-hidden { transform: translateY(100%); }
        .drawer-visible { transform: translateY(0); }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-card { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="overflow-x-hidden select-none">

    <!-- Auth Overlay -->
    <div id="login-screen" class="fixed inset-0 z-[300] bg-[#05060f] flex flex-col items-center justify-center p-8 hidden">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl mb-8 flex items-center justify-center shadow-2xl shadow-indigo-500/40">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold mb-8 text-center uppercase tracking-tighter">SandBox <span class="text-indigo-500">PRO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="username" placeholder="User" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500">
            <input type="password" id="password" placeholder="Pass" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">Unlock System</button>
        </div>
    </div>

    <!-- Main Mobile Interface -->
    <div id="dashboard-content" class="min-h-screen hidden flex flex-col">
        <header class="p-6 pt-12 flex justify-between items-center sticky top-0 bg-[#05060f]/80 backdrop-blur-md z-40">
            <div><h1 class="text-2xl font-extrabold tracking-tight italic">SANDBOX</h1><p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Live Active Pulse</p></div>
            <button onclick="toggleDrawer()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center active:scale-90 transition-all"><svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg></button>
        </header>

        <main class="p-6 safe-bottom space-y-8">
            <div class="glass rounded-[2.5rem] p-8 relative overflow-hidden border-l-4 border-indigo-500">
                <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-4">Stremio Provider</h3>
                <div class="mb-6">
                    <p class="text-sm font-bold text-slate-300 leading-relaxed mb-2">Connect your private server to Stremio.</p>
                    <div id="m-url-full" class="text-[9px] bg-slate-950 p-3 rounded-xl border border-slate-800 font-mono text-indigo-400/70 break-all">Loading...</div>
                </div>
                <a id="install-btn" href="#" class="block w-full text-center bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-[0.98] transition-all shadow-lg shadow-indigo-500/30">INSTALL ADDON</a>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass rounded-[2rem] p-6 text-center"><h3 class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-1 italic">Active</h3><div class="text-3xl font-black gradient-text" id="stream-count">0</div></div>
                <div class="glass rounded-[2rem] p-6 text-center"><h3 class="text-slate-500 text-[9px] font-black uppercase tracking-widest mb-1 italic">Net Rate</h3><div class="text-xl font-black text-green-400 mt-1" id="total-speed">0.0 KB/s</div></div>
            </div>

            <div class="space-y-10">
                <section>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4 px-2">Live Playback</h2>
                    <div id="active-streams" class="space-y-4"></div>
                </section>
                <section>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4 px-2 italic">Vault Storage</h2>
                    <div id="torrent-list" class="space-y-3"></div>
                </section>
            </div>
        </main>

        <nav class="fixed bottom-8 left-6 right-6 z-50">
            <div class="glass rounded-[2rem] p-4 flex justify-between items-center shadow-2xl shadow-indigo-500/10 border border-white/10">
                <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="w-12 h-12 flex items-center justify-center text-indigo-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
                <button onclick="document.getElementById('add-modal').classList.remove('hidden')" class="w-14 h-14 accent-gradient rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/40 active:scale-90 transition-all -translate-y-2"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg></button>
                <button onclick="toggleDrawer()" class="w-12 h-12 flex items-center justify-center text-slate-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg></button>
            </div>
        </nav>

        <div id="app-drawer" class="fixed inset-0 z-[100] hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleDrawer()"></div>
            <div id="drawer-content" class="absolute bottom-0 left-0 right-0 glass rounded-t-[3rem] p-10 space-y-6 transition-transform duration-500 drawer-hidden">
                <div class="w-12 h-1.5 bg-slate-800 rounded-full mx-auto mb-8"></div>
                <h3 class="text-center font-black uppercase tracking-widest text-indigo-400 mb-8 italic text-xs">Internal Systems</h3>
                <div class="grid grid-cols-3 gap-6">
                    <a href="/radarr" target="_blank" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-indigo-400 font-black text-xs">R</div><span class="text-[9px] font-black uppercase">Radarr</span></a>
                    <a href="/sonarr" target="_blank" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-indigo-400 font-black text-xs">S</div><span class="text-[9px] font-black uppercase">Sonarr</span></a>
                    <a href="/prowlarr" target="_blank" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-indigo-400 font-black text-xs">P</div><span class="text-[9px] font-black uppercase">Search</span></a>
                    <a href="/qbittorrent" target="_blank" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-indigo-400 font-black text-xs">Q</div><span class="text-[9px] font-black uppercase">Torrent</span></a>
                    <a href="/jackett" target="_blank" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center text-indigo-400 font-black text-xs">J</div><span class="text-[9px] font-black uppercase">Jackett</span></a>
                    <button onclick="handleLogout()" class="flex flex-col items-center gap-3"><div class="w-14 h-14 rounded-2xl bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500 font-black text-xs">X</div><span class="text-[9px] font-black uppercase">Exit</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-md p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8 animate-card">
            <div class="flex justify-between items-center mb-8"><h3 class="font-black italic text-indigo-400">ADD MEDIA</h3><button onclick="document.getElementById('add-modal').classList.add('hidden')"><svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
            <div class="space-y-6">
                <div><label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Magnet URL</label><input type="text" id="magnet-input" placeholder="Paste magnet..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-xs outline-none focus:border-indigo-500 transition-all font-mono"><button onclick="addByMagnet()" class="w-full mt-3 bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase shadow-xl shadow-indigo-500/20">Inject Magnet</button></div>
                <div class="text-center text-[9px] font-black text-slate-700 uppercase tracking-widest">— OR —</div>
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-800 py-4 rounded-2xl font-black text-xs uppercase border border-slate-700">Upload Torrent</button>
                <input type="file" id="file-input" class="hidden">
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const manifestUrl = window.location.origin + '/manifest.json';
        document.getElementById('m-url-full').innerText = manifestUrl;
        document.getElementById('install-btn').href = 'stremio://' + window.location.host + '/manifest.json';

        function toggleDrawer() {
            const drawer = document.getElementById('app-drawer');
            const content = document.getElementById('drawer-content');
            if (drawer.classList.contains('hidden')) {
                drawer.classList.remove('hidden');
                setTimeout(() => content.classList.replace('drawer-hidden', 'drawer-visible'), 10);
            } else {
                content.classList.replace('drawer-visible', 'drawer-hidden');
                setTimeout(() => drawer.classList.add('hidden'), 500);
            }
        }

        async function checkAuth() {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard-content').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) window.location.reload();
        }

        async function handleLogout() { await fetch('/api/logout', { method: 'POST' }); window.location.reload(); }

        // --- REAL-TIME UPDATES ---
        socket.on('pulse', (data) => {
            if (document.getElementById('dashboard-content').classList.contains('hidden')) return;

            // Stats
            document.getElementById('stream-count').innerText = data.streams.length;
            let totalSpeed = data.torrents.reduce((acc, t) => acc + parseFloat(t.speed), 0);
            document.getElementById('total-speed').innerText = totalSpeed.toFixed(1) + ' KB/s';

            // Streams
            const sDiv = document.getElementById('active-streams');
            if (data.streams.length === 0) {
                sDiv.innerHTML = '<div class="text-slate-600 text-center py-6 text-[10px] font-black uppercase italic tracking-widest w-full">Empty Buffer</div>';
            } else {
                sDiv.innerHTML = data.streams.map(s => `
                    <div class="glass p-6 rounded-[2rem] border border-indigo-500/10">
                        <h4 class="font-black text-[11px] truncate mb-4 uppercase tracking-tighter text-indigo-200">${s.name}</h4>
                        <div class="flex items-center gap-4">
                            <div class="relative w-12 h-12 flex-shrink-0">
                                <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36"><path class="text-slate-900" stroke-width="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="text-indigo-500" stroke-dasharray="${s.progress}, 100" stroke-width="4" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg>
                                <div class="absolute inset-0 flex items-center justify-center text-[10px] font-black">${Math.round(s.progress)}%</div>
                            </div>
                            <div class="flex flex-col justify-center flex-1">
                                <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest mb-1 italic">Downstream Rate</span>
                                <span class="text-sm font-black text-white">🚀 ${s.speed} KB/s</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Torrents
            const tDiv = document.getElementById('torrent-list');
            if (data.torrents.length === 0) {
                tDiv.innerHTML = '<div class="text-slate-600 text-center py-6 text-[10px] font-black uppercase italic tracking-widest">Vault Empty</div>';
            } else {
                tDiv.innerHTML = data.torrents.map(t => `
                    <div class="glass p-5 rounded-3xl flex items-center gap-4 border border-white/5">
                        <div class="w-10 h-10 rounded-2xl bg-slate-900 border border-slate-800 flex items-center justify-center flex-shrink-0"><svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-xs truncate text-slate-300 uppercase tracking-tighter">${t.name}</h4>
                            <div class="flex items-center gap-2 mt-1 italic">
                                <span class="text-[8px] font-black uppercase text-indigo-400 tracking-widest">${t.progress}%</span>
                                <span class="text-[8px] font-black uppercase text-slate-600 tracking-widest">• ${t.size}</span>
                            </div>
                        </div>
                        <button onclick="deleteTorrent('${t.hash}')" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center active:scale-90 transition-all"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                `).join('');
            }
        });

        async function addByMagnet() {
            const magnet = document.getElementById('magnet-input').value;
            if (!magnet) return;
            await fetch('/api/torrents/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ magnet }) });
            document.getElementById('add-modal').classList.add('hidden');
        }

        async function deleteTorrent(hash) { if (confirm("Remove forever?")) { await fetch(`/api/torrents/${hash}`, { method: 'DELETE' }); } }

        checkAuth();
    </script>
</body>
</html>
