<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SandBox PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060f; --glass: rgba(15, 18, 35, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #fff; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-nav { color: #818cf8; position: relative; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Auth Overlay -->
    <div id="login-screen" class="fixed inset-0 z-[300] bg-[#05060f] flex flex-col items-center justify-center p-8 hidden">
        <div class="w-20 h-20 bg-indigo-600 rounded-3xl mb-8 flex items-center justify-center shadow-2xl shadow-indigo-500/40">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold mb-2 text-center leading-tight">SandBox <span class="text-indigo-500">PRO</span></h1>
        <div class="w-full max-w-xs space-y-4">
            <input type="text" id="username" placeholder="User" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500">
            <input type="password" id="password" placeholder="Pass" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 text-sm outline-none focus:border-indigo-500">
            <button onclick="handleLogin()" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold">Unlock</button>
        </div>
    </div>

    <!-- Main Mobile Interface -->
    <div id="dashboard-content" class="min-h-screen hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 glass border-r border-slate-800 flex flex-col fixed h-full z-50 overflow-y-auto custom-scrollbar">
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 accent-gradient rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                    </div>
                    <span class="text-lg font-extrabold">SandBox</span>
                </div>
            </div>
            
            <nav class="p-4 space-y-1 flex-1">
                <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest px-4 mb-2">Systems</div>
                <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600/10 text-indigo-400 font-bold text-xs border border-indigo-500/10">Dashboard</a>
                <a href="/radarr" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-bold transition-all">Radarr (Movies)</a>
                <a href="/sonarr" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-bold transition-all">Sonarr (Series)</a>
                <a href="/prowlarr" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-bold transition-all">Prowlarr (Search)</a>
                <a href="/qbittorrent" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-bold transition-all">qBittorrent</a>
                <a href="/jackett" target="_blank" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 text-xs font-bold transition-all">Jackett</a>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <button onclick="handleLogout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500/70 hover:bg-red-500/5 text-xs font-bold transition-all">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64 p-6 md:p-10">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-extrabold tracking-tight">Dashboard</h1>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('add-modal').classList.remove('hidden')" class="w-10 h-10 glass rounded-xl flex items-center justify-center active:scale-90 transition-all">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <!-- Summary -->
                <div class="glass rounded-[2rem] p-8 accent-glow border-l-4 border-indigo-500">
                    <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-2">Network Streamer</h3>
                    <div class="flex items-baseline gap-2 mb-6">
                        <span class="text-5xl font-black gradient-text" id="stream-count">0</span>
                        <span class="text-slate-400 font-bold text-sm italic">tasks active</span>
                    </div>
                    <div class="bg-slate-900/50 rounded-2xl p-4 border border-slate-800">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Downstream Rate</span>
                            <span class="font-bold text-green-400 text-xs" id="total-speed">0.0 KB/s</span>
                        </div>
                    </div>
                </div>

                <!-- Addon Install -->
                <div class="glass rounded-[2rem] p-8">
                    <h3 class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-4">Stremio Provider</h3>
                    <div class="text-[10px] bg-slate-950 p-4 rounded-xl border border-slate-800 font-mono text-indigo-300 break-all mb-4" id="m-url-full">Loading...</div>
                    <a id="install-btn" href="#" class="block w-full text-center bg-indigo-600 py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-[0.98] transition-all shadow-lg shadow-indigo-500/20">INSTALL ADDON</a>
                </div>
            </div>

            <!-- Lists -->
            <div class="space-y-8">
                <section>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4 ml-2">Live Buffer</h2>
                    <div id="active-streams" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>

                <section>
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4 ml-2 italic">Vault Library</h2>
                    <div id="torrent-list" class="space-y-3"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-md p-6">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-8"><h3 class="font-black italic">ADD MEDIA</h3><button onclick="document.getElementById('add-modal').classList.add('hidden')"><svg class="w-6 h-6 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
            <div class="space-y-6">
                <div><label class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Magnet URL</label><input type="text" id="magnet-input" placeholder="magnet:?..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 text-xs outline-none focus:border-indigo-500 transition-all"><button onclick="addByMagnet()" class="w-full mt-3 bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase shadow-xl shadow-indigo-500/20">Inject Magnet</button></div>
                <div class="text-center text-[9px] font-black text-slate-700 uppercase tracking-widest">— OR —</div>
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-slate-800 py-4 rounded-2xl font-black text-xs uppercase border border-slate-700">Upload Torrent</button>
                <input type="file" id="file-input" class="hidden">
            </div>
        </div>
    </div>

    <script>
        const manifestUrl = window.location.origin + '/manifest.json';
        document.getElementById('m-url-full').innerText = manifestUrl;
        document.getElementById('install-btn').href = 'stremio://' + window.location.host + '/manifest.json';

        async function checkAuth() {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
                startPolling();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard-content').classList.add('hidden');
            }
        }

        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
            if (res.ok) checkAuth(); else { document.getElementById('login-error').classList.remove('hidden'); setTimeout(() => document.getElementById('login-error').classList.add('hidden'), 3000); }
        }

        async function handleLogout() { await fetch('/api/logout', { method: 'POST' }); checkAuth(); }

        async function updateUI() {
            try {
                const [sRes, tRes] = await Promise.all([fetch('/status'), fetch('/api/torrents')]);
                if (sRes.status === 401) return;
                const streams = await sRes.json();
                const torrents = await tRes.json();

                document.getElementById('stream-count').innerText = streams.length + torrents.length;
                let totalSpeed = torrents.reduce((acc, t) => acc + parseFloat(t.speed), 0);
                document.getElementById('total-speed').innerText = totalSpeed.toFixed(1) + ' KB/s';

                const sDiv = document.getElementById('active-streams');
                sDiv.innerHTML = streams.length === 0 ? '<p class="lg:col-span-2 text-slate-600 text-center py-6 text-[10px] font-bold uppercase italic">No active buffers</p>' : streams.map(s => `
                    <div class="glass p-5 rounded-3xl border border-indigo-500/10">
                        <h4 class="font-black text-[11px] truncate mb-3 uppercase tracking-tighter text-indigo-200">${s.name}</h4>
                        <div class="flex items-center gap-4">
                            <div class="relative w-10 h-10 flex-shrink-0">
                                <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36"><path class="text-slate-900" stroke-width="4" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /><path class="text-indigo-500" stroke-dasharray="${s.progress}, 100" stroke-width="4" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" /></svg>
                                <div class="absolute inset-0 flex items-center justify-center text-[8px] font-black">${Math.round(s.progress)}%</div>
                            </div>
                            <div class="flex justify-between flex-1 text-[9px] font-black uppercase text-slate-500 tracking-tighter">
                                <span>🚀 ${s.speed} KB/s</span><span>👤 ${s.peers} PEERS</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                const tDiv = document.getElementById('torrent-list');
                tDiv.innerHTML = torrents.length === 0 ? '<p class="text-slate-600 text-center py-6 text-[10px] font-bold uppercase italic tracking-widest">Library Empty</p>' : torrents.map(t => `
                    <div class="glass p-4 rounded-2xl flex items-center gap-4 transition-all active:scale-[0.98] border border-white/5">
                        <div class="w-8 h-8 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-[10px] truncate pr-2 text-slate-300 uppercase tracking-tighter">${t.name}</h4>
                            <div class="flex items-center gap-2 mt-0.5">
                                <span class="text-[7px] font-black uppercase px-1.5 py-0.5 rounded bg-indigo-500/10 text-indigo-400 tracking-widest">${t.status}</span>
                                <span class="text-[7px] font-black uppercase text-slate-600 tracking-widest">${t.progress}% • ${t.size}</span>
                            </div>
                        </div>
                        <button onclick="deleteTorrent('${t.hash}')" class="w-8 h-8 rounded-lg bg-red-500/10 text-red-500 flex items-center justify-center active:scale-90 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                `).join('');
            } catch (e) {}
        }

        async function addByMagnet() {
            const magnet = document.getElementById('magnet-input').value;
            if (!magnet) return;
            await fetch('/api/torrents/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ magnet }) });
            document.getElementById('add-modal').classList.add('hidden');
            updateUI();
        }

        async function deleteTorrent(hash) { if (confirm("Remove permanently?")) { await fetch(`/api/torrents/${hash}`, { method: 'DELETE' }); updateUI(); } }

        function startPolling() { setInterval(updateUI, 3000); updateUI(); }

        checkAuth();
    </script>
</body>
</html>
